<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Hypergolic Hull</title>
  <meta name="theme-color" content="#2f3b52" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Hypergolic Hull" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../shared/nav.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header (All Games / title / chat) is injected by nav.js below. -->

  <main class="game-area" id="gameArea">
    <div class="enemy-info" id="enemyInfo" hidden></div>

    <p id="objective" class="objective"></p>

    <div class="board-wrap" id="boardWrap">
      <div class="board-frame">
        <canvas id="board" width="320" height="320"></canvas>
        <span id="levelLabel" class="sector-chip">Sector 1 · Best 1</span>
        <div class="run-overlay" id="runOverlay" hidden>
          <h2 id="runOverlayTitle"></h2>
          <p id="runOverlayBody"></p>
          <button id="continueBtn" hidden>Keep Flying</button>
          <button id="restartBtn">New Run</button>
        </div>
        <div class="run-overlay outpost-overlay" id="outpostOverlay" hidden>
          <h2><i class="swatch swatch-outpost"></i> Sector Outpost</h2>
          <p>Salvage: <span id="outpostSalvage">0</span></p>
          <div class="outpost-offers" id="outpostOffers"></div>
          <button id="outpostCloseBtn">Undock</button>
        </div>
      </div>
    </div>

    <!-- The control panel: everything about the ship in ONE framed console
         ("bring all the information together nicely as what looks like a
         control panel") — gauges, this turn's actions, the Scan/Hardpoints
         modes, and the readout strip. Every gauge/button is dynamic:
         gauges flash on change, actions appear the moment they unlock. -->
    <div class="console control-panel">
      <div class="panel-gauges">
        <span class="stat-wrap" id="shieldWrap" hidden>
          <span class="stat-label">Shields</span>
          <span class="stat-bar" id="shieldBar"></span>
        </span>
        <span class="stat-wrap" id="hullWrap">
          <span class="stat-label">Hull</span>
          <span class="stat-bar" id="hullBar"></span>
        </span>
        <span class="stat-wrap" id="energyWrap">
          <span class="stat-label">Reactor</span>
          <span class="stat-bar" id="energyBar"></span>
        </span>
        <span class="stat-wrap" id="salvageWrap">
          <span class="stat-label">Salvage</span>
          <span class="stat-value" id="salvageValue">0</span>
        </span>
      </div>
      <div class="console-grid actions-grid">
        <button id="holdBtn" class="hold-btn">Hold Position</button>
        <button data-mode="tractor">Tractor Beam</button>
        <button id="targetLockBtn" title="Aim without moving — tap an adjacent hex to face it, then Hold Position to fire">Target Lock</button>
        <span class="weapon-stats" id="tractorStats" hidden></span>
      </div>
      <div class="console-grid modes-grid">
        <button id="scanBtn" class="scan-btn" title="Scan mode — inspect anything on the board; movement and actions are disabled while it's open" aria-label="Scan">Scan</button>
        <button id="shipBtn" class="scan-btn" title="Systems — full-screen view of your flagship, its weapons, and upgrades" aria-label="Systems">Systems</button>
        <button id="mapBtn" class="scan-btn" title="Map — the sectors you've charted this run, and the gates ahead" aria-label="Map">Map</button>
      </div>
      <p id="log" class="log"></p>
    </div>

  </main>

  <div class="ship-overlay" id="shipOverlay" hidden>
    <div class="ship-overlay-inner">
      <h2>Systems</h2>
      <img class="ship-portrait" src="icons/flagship.png" alt="Your flagship" />
      <div class="ship-section" id="shipStats"></div>
      <div class="ship-section" id="shipHardpoints"></div>
      <button id="shipCloseBtn">Back to the fight</button>
    </div>
  </div>

  <!-- The starmap — only what you actually know: sectors charted this run,
       where you are, and the gates ahead as uncharted contacts. -->
  <div class="ship-overlay" id="mapOverlay" hidden>
    <div class="ship-overlay-inner map-inner">
      <h2>Map</h2>
      <div class="ship-section" id="mapChart"></div>
      <button id="mapCloseBtn">Back to the fight</button>
    </div>
  </div>

  <div class="install-banner" id="installBanner">
    <img class="install-banner-icon" src="icons/icon.svg" alt="" />
    <div class="install-banner-text" id="installBannerText">
      Install this game: tap <span class="share-glyph" aria-label="Share">&#x2B06;&#xFE0E;</span>
      then <strong>Add to Home Screen</strong>
    </div>
    <button class="install-banner-btn" id="installBannerBtn" hidden>Install</button>
    <button class="install-banner-close" id="installBannerClose" aria-label="Dismiss">&times;</button>
  </div>

  <script src="../../shared/nav.js"
          data-game-id="hypergolic-hull"
          data-game-name="Hypergolic Hull"
          data-version="v1"
          data-root="../../"></script>
  <script src="../../shared/storage.js"></script>
  <script src="levels.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
  <script src="../../shared/pwa.js" data-sw="sw.js"></script>
</body>
</html>
