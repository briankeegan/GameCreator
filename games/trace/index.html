<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>Step in the Cat</title>
  <meta name="theme-color" content="#5a7a8c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Step in the Cat" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../shared/nav.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header (All Games / title / chat) is injected by nav.js below. -->

  <main class="game-area" id="gameArea">
    <div class="hud" id="hud">
      <div class="stat"><span class="stat-label">Pins used</span><span class="stat-value" id="pinsValue">0</span></div>
      <div class="stat"><span class="stat-label">Best trap</span><span class="stat-value" id="bestValue">—</span></div>
      <div class="stat"><span class="stat-label">Wins</span><span class="stat-value" id="winsValue">0</span></div>
    </div>

    <p class="ticker" id="ticker">Tap a step to drop a pin. Wall the cat in before it reaches the edge.</p>

    <div class="board-wrap">
      <div class="board" id="board"></div>
    </div>

    <p class="pin-hint" id="pinHint"></p>
    <div class="pin-hand" id="pinHand"></div>

    <div class="run-overlay" id="runOverlay" hidden>
      <div class="run-overlay-card">
        <h2 id="overlayTitle"></h2>
        <p id="overlayBody"></p>
        <button id="restartBtn">New Game</button>
      </div>
    </div>
  </main>

  <div class="install-banner" id="installBanner">
    <img class="install-banner-icon" src="icons/icon.svg" alt="" />
    <div class="install-banner-text" id="installBannerText">
      Install this game: tap <span class="share-glyph" aria-label="Share">&#x2B06;&#xFE0E;</span>
      then <strong>Add to Home Screen</strong>
    </div>
    <button class="install-banner-btn" id="installBannerBtn" hidden>Install</button>
    <button class="install-banner-close" id="installBannerClose" aria-label="Dismiss">&times;</button>
  </div>

  <script src="../../shared/nav.js"
          data-game-id="trace"
          data-game-name="Step in the Cat"
          data-version="v1"
          data-root="../../"></script>
  <script src="../../shared/storage.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
  <script src="../../shared/pwa.js" data-sw="sw.js"></script>
</body>
</html>
