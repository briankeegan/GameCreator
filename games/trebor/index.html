<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>TREEBOAR</title>
  <meta name="theme-color" content="#170e0c" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TREEBOAR" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon.svg" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="../../shared/nav.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Header (All Games / title / chat) is injected by nav.js below. -->

  <main class="game-area" id="gameArea">
    <div class="hud" id="hud">
      <div class="hud-row">
        <span class="room-label" id="roomLabel"></span>
        <span class="best-label" id="bestLabel"></span>
        <button class="deck-btn" id="deckBtn" hidden>Deck</button>
      </div>
      <div class="hud-row">
        <div class="dog-vitals">
          <span class="dog-portrait" id="dogPortrait"></span>
          <div class="hp-bar"><div class="hp-fill" id="dogHpFill"></div><span class="hp-text" id="dogHpText"></span></div>
          <span class="block-chip" id="dogBlockChip" hidden><span id="dogBlockIcon"></span> <span id="dogBlockValue">0</span></span>
        </div>
        <div class="energy-pips" id="energyPips"></div>
      </div>
      <p class="objective" id="objective"></p>
    </div>

    <div class="class-select" id="classSelect" hidden>
      <h2 class="class-select-title">Choose your dog</h2>
      <div class="class-options" id="classOptions"></div>
    </div>

    <div class="node-choice" id="nodeChoice" hidden>
      <div class="node-options" id="nodeOptions"></div>
    </div>

    <div class="reward-screen" id="rewardScreen" hidden>
      <div class="reward-options" id="rewardOptions"></div>
      <button class="skip-btn" id="skipRewardBtn">Skip Reward</button>
    </div>

    <div class="reward-screen boss-reward-screen" id="bossRewardScreen" hidden>
      <h2 class="boss-reward-title" id="bossRewardTitle"></h2>
      <div class="reward-options" id="bossRewardOptions"></div>
      <button class="skip-btn" id="skipBossRewardBtn">Skip Reward</button>
    </div>

    <div class="reward-screen rest-site" id="restSite" hidden>
      <h2 class="rest-title">A Safe Spot</h2>
      <div class="rest-actions">
        <button class="rest-action" id="restHealBtn">
          <span class="rest-action-name">Rest</span>
          <span class="rest-action-desc" id="restHealDesc">Recover Hull</span>
        </button>
        <button class="rest-action" id="restUpgradeBtn">
          <span class="rest-action-name">Sharpen</span>
          <span class="rest-action-desc">Upgrade a card</span>
        </button>
        <button class="rest-action" id="restRemoveBtn">
          <span class="rest-action-name">Let Go</span>
          <span class="rest-action-desc">Remove a card</span>
        </button>
      </div>
    </div>

    <div class="battlefield" id="battlefield" hidden></div>

    <div class="console" id="combatConsole" hidden>
      <div class="hand" id="hand"></div>
      <button class="end-turn-btn" id="endTurnBtn">End Turn</button>
    </div>

    <div class="deck-overlay" id="deckOverlay" hidden>
      <div class="deck-modal">
        <div class="deck-modal-head">
          <h3>Your Deck · <span id="deckCount">0</span></h3>
          <button class="deck-close-btn" id="deckCloseBtn" aria-label="Close">&times;</button>
        </div>
        <div class="deck-cards" id="deckCards"></div>
      </div>
    </div>

    <div class="run-overlay" id="runOverlay" hidden>
      <div class="run-overlay-card">
        <h2 id="runOverlayTitle"></h2>
        <p id="runOverlayBody"></p>
        <button id="restartBtn">New Run</button>
      </div>
    </div>
  </main>

  <div class="install-banner" id="installBanner">
    <img class="install-banner-icon" src="icons/icon.svg" alt="" />
    <div class="install-banner-text" id="installBannerText">
      Install this game: tap <span class="share-glyph" aria-label="Share">&#x2B06;&#xFE0E;</span>
      then <strong>Add to Home Screen</strong>
    </div>
    <button class="install-banner-btn" id="installBannerBtn" hidden>Install</button>
    <button class="install-banner-close" id="installBannerClose" aria-label="Dismiss">&times;</button>
  </div>

  <script src="../../shared/nav.js"
          data-game-id="trebor"
          data-game-name="TREEBOAR"
          data-version="v1"
          data-root="../../"></script>
  <script src="../../shared/storage.js"></script>
  <script src="content.js"></script>
  <script src="engine.js"></script>
  <script src="app.js"></script>
  <script src="../../shared/pwa.js" data-sw="sw.js"></script>
</body>
</html>
