name: Generate image

# Manually triggered only (workflow_dispatch) — never runs on a push, so
# there's no risk of it firing unexpectedly or costing money on its own.
# Trigger it from the Actions tab ("Run workflow"), or Claude can trigger
# it via the GitHub API with the same three inputs.
#
# This is the freeform/one-off action: no persisted style, every prompt
# starts blank. For an asset that should match a game's established look
# (a whole set of sprites/icons), use "Generate game asset" instead — it
# reads games/<id>/art-style.json and locks in that game's camera angle,
# rendering style, palette, and background automatically.
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Image description to send to the model"
        required: true
        type: string
      output_path:
        description: "Where to save it in the repo, e.g. games/trebor/icons/hero.png"
        required: true
        type: string
      size:
        description: "Image size"
        required: false
        type: choice
        options:
          - "1024x1024"
          - "1024x1536"
          - "1536x1024"
        default: "1024x1024"
      quality:
        description: "Render quality — cost rises steeply: low < medium < high. Default medium; bump to high only when the asset really warrants it."
        required: false
        type: choice
        options:
          - "low"
          - "medium"
          - "high"
        default: "medium"
      force:
        description: "Regenerate (and re-bill) even if the output file already exists. Off by default so re-running a batch never pays twice."
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  actions: write   # dispatch pages.yml so the new image actually deploys

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Calls OpenAI's image API directly (plain curl + jq, both preinstalled
      # on this runner) — no SDK, no extra dependency. Writing the decoded
      # PNG straight to disk here means it's a normal git-tracked binary
      # blob, sidestepping the base64-double-encoding corruption this repo
      # hit earlier when pushing binary files through Claude's own tools.
      #
      # Model is gpt-image-1, not dall-e-3 — this account's API rejected
      # dall-e-3's "response_format" param outright ("Unknown parameter"),
      # and gpt-image-1 (OpenAI's current default) always returns b64_json
      # without needing to ask, so that param is dropped entirely here.
      - name: Generate image via OpenAI
        id: gen
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          SIZE: ${{ inputs.size }}
          QUALITY: ${{ inputs.quality }}
          OUTPUT_PATH: ${{ inputs.output_path }}
          FORCE: ${{ inputs.force }}
        run: |
          # Don't pay to regenerate art we already have — skip unless forced.
          if [ -s "$OUTPUT_PATH" ] && [ "$FORCE" != "true" ]; then
            echo "::notice::$OUTPUT_PATH already exists — skipping (re-run with force=true to regenerate)."
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          mkdir -p "$(dirname "$OUTPUT_PATH")"

          # Retry on rate-limit (HTTP 429) / transient 5xx with backoff. A
          # rejected request is NOT billed, so retrying costs nothing — it just
          # keeps bulk batches from failing against the per-minute image cap.
          ok=""
          for attempt in 1 2 3 4 5 6; do
            resp=$(curl -sS -w '\n%{http_code}' https://api.openai.com/v1/images/generations \
              -H "Authorization: Bearer $OPENAI_API_KEY" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg prompt "$PROMPT" --arg size "$SIZE" --arg quality "$QUALITY" \
                    '{model: "gpt-image-1", prompt: $prompt, size: $size, quality: $quality, n: 1}')" || true)
            code=$(printf '%s' "$resp" | tail -n1)
            body=$(printf '%s' "$resp" | sed '$d')
            if [ "$code" = "200" ]; then ok=1; break; fi
            error=$(printf '%s' "$body" | jq -r '.error.message // empty' 2>/dev/null)
            if [ "$code" = "429" ] || [ "$code" = "000" ] || [ "${code#5}" != "$code" ]; then
              wait=$((attempt * 15 + RANDOM % 8))
              echo "Rate-limited/transient (HTTP $code, attempt $attempt): ${error:-no body} — retrying in ${wait}s"
              sleep "$wait"
              continue
            fi
            echo "::error::OpenAI API error (HTTP $code): ${error:-unknown}"
            exit 1
          done
          if [ -z "$ok" ]; then
            echo "::error::Still rate-limited after retries — try again later."
            exit 1
          fi

          printf '%s' "$body" | jq -r '.data[0].b64_json' | base64 -d > "$OUTPUT_PATH"

          if [ ! -s "$OUTPUT_PATH" ]; then
            echo "::error::Output file is empty — generation likely failed"
            exit 1
          fi

      - name: Commit, push, and deploy
        if: steps.gen.outputs.skipped != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output_path }}"
          if git commit -m "Generate image: ${{ inputs.prompt }}"; then
            git push
            # A GITHUB_TOKEN push does not trigger Pages (recursion prevention),
            # so dispatch the deploy explicitly — workflow_dispatch is the
            # documented exception that DOES fire from GITHUB_TOKEN.
            gh workflow run pages.yml --ref main
          else
            echo "Nothing to commit — skipping deploy"
          fi
