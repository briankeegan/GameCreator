name: Generate image

# Manually triggered only (workflow_dispatch) — never runs on a push, so
# there's no risk of it firing unexpectedly or costing money on its own.
# Trigger it from the Actions tab ("Run workflow"), or Claude can trigger
# it via the GitHub API with the same three inputs.
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Image description to send to the model"
        required: true
        type: string
      output_path:
        description: "Where to save it in the repo, e.g. games/trebor/icons/hero.png"
        required: true
        type: string
      size:
        description: "Image size"
        required: false
        type: choice
        options:
          - "1024x1024"
          - "1024x1536"
          - "1536x1024"
        default: "1024x1024"

permissions:
  contents: write
  actions: write   # dispatch pages.yml so the new image actually deploys

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Calls OpenAI's image API directly (plain curl + jq, both preinstalled
      # on this runner) — no SDK, no extra dependency. Writing the decoded
      # PNG straight to disk here means it's a normal git-tracked binary
      # blob, sidestepping the base64-double-encoding corruption this repo
      # hit earlier when pushing binary files through Claude's own tools.
      #
      # Model is gpt-image-1, not dall-e-3 — this account's API rejected
      # dall-e-3's "response_format" param outright ("Unknown parameter"),
      # and gpt-image-1 (OpenAI's current default) always returns b64_json
      # without needing to ask, so that param is dropped entirely here.
      - name: Generate image via OpenAI
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PROMPT: ${{ inputs.prompt }}
          SIZE: ${{ inputs.size }}
          OUTPUT_PATH: ${{ inputs.output_path }}
        run: |
          mkdir -p "$(dirname "$OUTPUT_PATH")"

          resp=$(curl -sS https://api.openai.com/v1/images/generations \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(jq -n --arg prompt "$PROMPT" --arg size "$SIZE" \
                  '{model: "gpt-image-1", prompt: $prompt, size: $size, quality: "high", n: 1}')")

          error=$(echo "$resp" | jq -r '.error.message // empty')
          if [ -n "$error" ]; then
            echo "::error::OpenAI API error: $error"
            exit 1
          fi

          echo "$resp" | jq -r '.data[0].b64_json' | base64 -d > "$OUTPUT_PATH"

          if [ ! -s "$OUTPUT_PATH" ]; then
            echo "::error::Output file is empty — generation likely failed"
            exit 1
          fi

      - name: Commit, push, and deploy
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ inputs.output_path }}"
          if git commit -m "Generate image: ${{ inputs.prompt }}"; then
            git push
            # A GITHUB_TOKEN push does not trigger Pages (recursion prevention),
            # so dispatch the deploy explicitly — workflow_dispatch is the
            # documented exception that DOES fire from GITHUB_TOKEN.
            gh workflow run pages.yml --ref main
          else
            echo "Nothing to commit — skipping deploy"
          fi
