name: Deploy static site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Same mechanism HayleysGame's clubhouse already uses in production —
      # after chasing several more elaborate "fixes" here that each added a
      # new bug of their own, reverted back to exactly this.
      - name: Stamp version
        run: echo "window.APP_VERSION = \"v0.${GITHUB_RUN_NUMBER}\";" > version.js
      - name: Setup Pages
        uses: actions/configure-pages@v5
      # Archiving manually (same tar command actions/upload-pages-artifact
      # uses internally) instead of that composite action, because it
      # doesn't expose overwrite control. Without overwrite:true, re-running
      # this workflow after a first attempt already uploaded an artifact
      # leaves two artifacts named "github-pages" behind, and deploy-pages
      # then fails with "Multiple artifacts ... unexpectedly found" — this
      # makes a rerun safe by replacing the old artifact instead.
      - name: Archive site
        run: |
          tar \
            --dereference --hard-dereference \
            --directory "." \
            -cvf "$RUNNER_TEMP/artifact.tar" \
            --exclude=.git \
            --exclude=.github \
            .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          overwrite: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
